<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarCoin — 可视化区块链</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <!-- 顶部状态 -->
    <div class="header">
        <div class="logo">⭐ StarCoin</div>
        <div class="stats" id="headerStats">
            <div class="stat-box">
                <div class="stat-label">区块数量</div>
                <div class="stat-value" id="statBlocks">--</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">链状态</div>
                <div class="stat-value" id="statValid">--</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">交易池</div>
                <div class="stat-value" id="statMempool">--</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">节点端口</div>
                <div class="stat-value" id="statPort">--</div>
            </div>
        </div>
    </div>

    <!-- 三栏布局 -->
    <div class="main-layout">

        <!-- 第一栏：钱包管理 -->
        <div class="panel">
            <h2>💼 我的钱包</h2>
            <button onclick="generateWallet()">＋ 生成新钱包</button>
            <hr class="section-divider">
            <div id="walletList"></div>
            <div id="selectedWalletInfo" style="display:none; margin-top:15px; padding-top:15px; border-top:1px dashed rgba(255,255,255,0.1);">
                <div style="font-size:12px; color:#ffd700; margin-bottom:6px;">📌 当前选中钱包</div>
                <div class="code-box" id="selectedWalletAddress"></div>
                <div style="font-size:11px; color:#888; margin-top:6px;">
                    余额: <span id="selectedWalletBalance" style="color:#4ade80; font-weight:bold;">--</span>
                </div>
                <button class="secondary small" style="margin-top:8px;" onclick="copySelectedAddress()">复制地址</button>
                <div style="margin-top:12px;">
                    <div style="font-size:11px; color:#aaa; margin-bottom:4px;">交易历史</div>
                    <div id="selectedWalletHistory" style="max-height:150px; overflow-y:auto;"></div>
                </div>
            </div>
        </div>

        <!-- 第二栏：转账 -->
        <div class="panel">
            <h2>💰 发起转账（ECDSA 签名）</h2>

            <label>① 发送方（选择一个已有钱包）</label>
            <select class="wallet-dropdown" id="fromWallet">
                <option value="">-- 请选择钱包 --</option>
            </select>
            <div class="hint" id="fromBalanceHint"></div>

            <label>② 接收方地址（粘贴目标地址）</label>
            <input type="text" id="toAddress" placeholder="粘贴接收方地址，或点击右侧钱包的"设为接收方"">

            <label>③ 转账金额</label>
            <input type="number" id="amount" value="10" min="1" step="1">

            <label>④ 矿工费（可选，越高越优先打包）</label>
            <input type="number" id="fee" value="1" min="0" step="1">

            <label>⑤ 备注（可选）</label>
            <input type="text" id="note" placeholder="例如：午餐费用">

            <div class="message info" id="signInfo" style="display:none;">
                🔑 将使用发送方的私钥做 ECDSA 签名（仅在本地签名，私钥不会广播）
            </div>

            <div class="message" id="txMessage"></div>

            <button onclick="submitTransaction()" style="width:100%; margin-top:15px; padding:12px; font-size:15px;">
                ✍️ 签名并提交交易
            </button>

            <hr class="section-divider">

            <h2 style="margin-top:5px;">⛏️ 挖矿打包</h2>
            <label>矿工奖励接收地址（默认使用当前选中钱包）</label>
            <input type="text" id="minerAddress" placeholder="自动填入当前选中钱包的地址">
            <button onclick="mineBlock()" id="mineBtn" style="width:100%; margin-top:10px; padding:12px; font-size:15px;">
                ⛏️ 开始挖矿并打包交易
            </button>

            <div class="hint" style="margin-top:10px;">
                💡 流程：先生成钱包 → 挖矿获得初始币 → 用私钥签名发起转账 → 再次挖矿把交易打包进区块
            </div>
        </div>

        <!-- 第三栏：交易池 + 地址榜 -->
        <div class="panel">
            <h2>📝 交易池（待打包）</h2>
            <div id="mempool"></div>

            <hr class="section-divider">

            <h2>🏆 地址排行榜</h2>
            <div id="addressRank"></div>

            <hr class="section-divider">

            <button class="secondary small" onclick="refreshAll()" style="width:100%; margin-top:5px;">🔄 刷新全部数据</button>
        </div>

    </div>

    <!-- 区块链可视化（底部通栏） -->
    <div class="panel wide-panel">
        <h2>🔗 区块链 — 区块详情</h2>
        <div class="chain-visual" id="chainVisual"></div>
    </div>

</div>

<script src="src/front/app.js"></script>
<script src="src/front/wallet.js"></script>
<script src="src/front/main.js"></script>

</body>
</html>
