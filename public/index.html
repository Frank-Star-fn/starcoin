<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarCoin — 可视化区块链</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        color: #e8e8e8;
        min-height: 100vh;
        padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }

    /* 顶部状态条 */
    .header {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
    }
    .logo {
        font-size: 28px;
        font-weight: bold;
        background: linear-gradient(45deg, #ffd700, #ffb700);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .stats {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
    }
    .stat-box {
        background: rgba(255,255,255,0.08);
        border-radius: 8px;
        padding: 10px 16px;
        min-width: 110px;
        text-align: center;
    }
    .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 20px; font-weight: bold; margin-top: 4px; }
    .stat-value.valid { color: #4ade80; }
    .stat-value.invalid { color: #f87171; }

    /* 主布局：三栏 */
    .main-layout {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
    }
    @media (max-width: 1000px) { .main-layout { grid-template-columns: 1fr; } }

    .panel {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 20px;
    }
    .panel h2 {
        font-size: 16px;
        margin-bottom: 15px;
        color: #ffd700;
        border-bottom: 1px solid rgba(255,215,0,0.2);
        padding-bottom: 8px;
    }

    /* 钱包列表 */
    .wallet-item {
        background: rgba(255,255,255,0.04);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 10px;
        border: 2px solid transparent;
        cursor: pointer;
        transition: all 0.2s;
    }
    .wallet-item:hover { background: rgba(255,255,255,0.08); }
    .wallet-item.selected {
        border-color: #ffd700;
        background: rgba(255,215,0,0.08);
    }
    .wallet-label { font-weight: bold; color: #ffd700; margin-bottom: 4px; }
    .wallet-address {
        font-family: monospace;
        font-size: 11px;
        color: #888;
        word-break: break-all;
        margin-bottom: 6px;
    }
    .wallet-balance { font-size: 18px; font-weight: bold; color: #4ade80; }
    .wallet-actions { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }

    /* 按钮 */
    button {
        background: linear-gradient(135deg, #ffd700, #ffb700);
        color: #1a1a2e;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        font-size: 13px;
        transition: transform 0.1s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,215,0,0.3); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    button.secondary {
        background: rgba(255,255,255,0.1);
        color: #e8e8e8;
    }
    button.danger {
        background: linear-gradient(135deg, #f87171, #dc2626);
        color: white;
    }
    button.small { padding: 6px 10px; font-size: 11px; }

    /* 表单 */
    label { display: block; font-size: 12px; color: #aaa; margin: 10px 0 5px; }
    input, textarea {
        width: 100%;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 6px;
        padding: 8px 12px;
        color: #e8e8e8;
        font-size: 13px;
        font-family: inherit;
    }
    input:focus, textarea:focus { outline: none; border-color: #ffd700; }

    /* 发送者选择 */
    .wallet-dropdown {
        width: 100%;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 6px;
        padding: 10px;
        color: #e8e8e8;
        font-size: 13px;
    }

    /* 消息提示 */
    .message {
        padding: 10px 14px;
        border-radius: 6px;
        margin: 10px 0;
        font-size: 13px;
        display: none;
    }
    .message.success { background: rgba(74, 222, 128, 0.15); border: 1px solid #4ade80; color: #4ade80; display: block; }
    .message.error { background: rgba(248, 113, 113, 0.15); border: 1px solid #f87171; color: #f87171; display: block; }
    .message.info { background: rgba(96, 165, 250, 0.15); border: 1px solid #60a5fa; color: #60a5fa; display: block; }

    /* 挖矿动画 */
    @keyframes mining-glow {
        0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.3); }
        50% { box-shadow: 0 0 40px rgba(255,215,0,0.6); }
    }
    .mining-active { animation: mining-glow 1s infinite; }

    /* 底部区块 */
    .wide-panel { grid-column: 1 / -1; }

    /* 交易池 */
    .mempool-item {
        background: rgba(96,165,250,0.1);
        border-left: 3px solid #60a5fa;
        padding: 8px 12px;
        margin: 6px 0;
        border-radius: 4px;
        font-size: 12px;
    }
    .mempool-empty { color: #666; font-style: italic; padding: 10px; text-align: center; }

    /* 区块链可视化 */
    .chain-visual {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 15px;
        background: rgba(0,0,0,0.2);
        border-radius: 8px;
        max-height: 400px;
        overflow-y: auto;
    }
    .block-card {
        background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,183,0,0.05));
        border: 1px solid rgba(255,215,0,0.3);
        border-radius: 8px;
        padding: 12px;
        width: 240px;
        flex-shrink: 0;
        font-size: 11px;
    }
    .block-card.genesis { border-color: #4ade80; background: linear-gradient(135deg, rgba(74,222,128,0.1), rgba(34,197,94,0.05)); }
    .block-height { font-size: 14px; font-weight: bold; color: #ffd700; margin-bottom: 6px; }
    .block-hash { font-family: monospace; font-size: 10px; color: #888; word-break: break-all; margin: 4px 0; }
    .block-tx {
        background: rgba(255,255,255,0.04);
        border-radius: 4px;
        padding: 4px 6px;
        margin: 3px 0;
        font-size: 10px;
    }
    .block-tx.reward { color: #4ade80; border-left: 2px solid #4ade80; padding-left: 6px; }
    .block-tx.signed { color: #60a5fa; border-left: 2px solid #60a5fa; padding-left: 6px; }
    .block-tx.unsigned { color: #fbbf24; border-left: 2px solid #fbbf24; padding-left: 6px; }

    /* 地址排行榜 */
    .address-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 10px;
        margin: 4px 0;
        background: rgba(255,255,255,0.04);
        border-radius: 6px;
        font-size: 12px;
    }
    .address-row .addr { font-family: monospace; color: #888; font-size: 11px; }
    .address-row .bal { font-weight: bold; color: #4ade80; }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,215,0,0.5); }

    /* 提示文字 */
    .hint { font-size: 11px; color: #888; margin-top: 4px; }
    .code-box {
        background: rgba(0,0,0,0.3);
        border-radius: 4px;
        padding: 8px;
        font-family: monospace;
        font-size: 11px;
        word-break: break-all;
        margin: 6px 0;
        max-height: 80px;
        overflow-y: auto;
    }

    /* 分段 */
    .section-divider {
        border: none;
        border-top: 1px dashed rgba(255,255,255,0.1);
        margin: 15px 0;
    }
</style>
</head>
<body>
<div class="container">

    <!-- 顶部状态 -->
    <div class="header">
        <div class="logo">⭐ StarCoin</div>
        <div class="stats" id="headerStats">
            <div class="stat-box">
                <div class="stat-label">区块数量</div>
                <div class="stat-value" id="statBlocks">--</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">链状态</div>
                <div class="stat-value" id="statValid">--</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">交易池</div>
                <div class="stat-value" id="statMempool">--</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">节点端口</div>
                <div class="stat-value" id="statPort">--</div>
            </div>
        </div>
    </div>

    <!-- 三栏布局 -->
    <div class="main-layout">

        <!-- 第一栏：钱包管理 -->
        <div class="panel">
            <h2>💼 我的钱包</h2>
            <button onclick="generateWallet()">＋ 生成新钱包</button>
            <hr class="section-divider">
            <div id="walletList"></div>
            <div id="selectedWalletInfo" style="display:none; margin-top:15px; padding-top:15px; border-top:1px dashed rgba(255,255,255,0.1);">
                <div style="font-size:12px; color:#ffd700; margin-bottom:6px;">📌 当前选中钱包</div>
                <div class="code-box" id="selectedWalletAddress"></div>
                <div style="font-size:11px; color:#888; margin-top:6px;">
                    余额: <span id="selectedWalletBalance" style="color:#4ade80; font-weight:bold;">--</span>
                </div>
                <button class="secondary small" style="margin-top:8px;" onclick="copySelectedAddress()">复制地址</button>
                <div style="margin-top:12px;">
                    <div style="font-size:11px; color:#aaa; margin-bottom:4px;">交易历史</div>
                    <div id="selectedWalletHistory" style="max-height:150px; overflow-y:auto;"></div>
                </div>
            </div>
        </div>

        <!-- 第二栏：转账 -->
        <div class="panel">
            <h2>💰 发起转账（ECDSA 签名）</h2>

            <label>① 发送方（选择一个已有钱包）</label>
            <select class="wallet-dropdown" id="fromWallet">
                <option value="">-- 请选择钱包 --</option>
            </select>
            <div class="hint" id="fromBalanceHint"></div>

            <label>② 接收方地址（粘贴目标地址）</label>
            <input type="text" id="toAddress" placeholder="粘贴接收方地址，或点击右侧钱包的"设为接收方"">

            <label>③ 转账金额</label>
            <input type="number" id="amount" value="10" min="1" step="1">

            <label>④ 矿工费（可选，越高越优先打包）</label>
            <input type="number" id="fee" value="1" min="0" step="1">

            <label>⑤ 备注（可选）</label>
            <input type="text" id="note" placeholder="例如：午餐费用">

            <div class="message info" id="signInfo" style="display:none;">
                🔑 将使用发送方的私钥做 ECDSA 签名（仅在本地签名，私钥不会广播）
            </div>

            <div class="message" id="txMessage"></div>

            <button onclick="submitTransaction()" style="width:100%; margin-top:15px; padding:12px; font-size:15px;">
                ✍️ 签名并提交交易
            </button>

            <hr class="section-divider">

            <h2 style="margin-top:5px;">⛏️ 挖矿打包</h2>
            <label>矿工奖励接收地址（默认使用当前选中钱包）</label>
            <input type="text" id="minerAddress" placeholder="自动填入当前选中钱包的地址">
            <button onclick="mineBlock()" id="mineBtn" style="width:100%; margin-top:10px; padding:12px; font-size:15px;">
                ⛏️ 开始挖矿并打包交易
            </button>

            <div class="hint" style="margin-top:10px;">
                💡 流程：先生成钱包 → 挖矿获得初始币 → 用私钥签名发起转账 → 再次挖矿把交易打包进区块
            </div>
        </div>

        <!-- 第三栏：交易池 + 地址榜 -->
        <div class="panel">
            <h2>📝 交易池（待打包）</h2>
            <div id="mempool"></div>

            <hr class="section-divider">

            <h2>🏆 地址排行榜</h2>
            <div id="addressRank"></div>

            <hr class="section-divider">

            <button class="secondary small" onclick="refreshAll()" style="width:100%; margin-top:5px;">🔄 刷新全部数据</button>
        </div>

    </div>

    <!-- 区块链可视化（底部通栏） -->
    <div class="panel wide-panel">
        <h2>🔗 区块链 — 点击区块查看详情</h2>
        <div class="chain-visual" id="chainVisual"></div>
    </div>

</div>

<script>
/* ============================================================
   状态管理
   ============================================================ */
const state = {
    wallets: [],      // [{label, privateKey, publicKey, address}]
    selectedWallet: -1
};

/* ============================================================
   工具函数
   ============================================================ */
async function api(path, method = 'GET', body = null) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(path, opts);
    return await res.json();
}

function shortAddr(addr, len = 12) {
    if (!addr) return '';
    return addr.length > len ? addr.substring(0, len) + '...' : addr;
}

function escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showMessage(id, text, type = 'info', timeoutMs = 3500) {
    const el = document.getElementById(id);
    el.className = 'message ' + type;
    el.textContent = text;
    if (timeoutMs > 0) {
        clearTimeout(el._timer);
        el._timer = setTimeout(() => { el.className = 'message'; el.textContent = ''; }, timeoutMs);
    }
}

function clearMessage(id) {
    const el = document.getElementById(id);
    el.className = 'message';
    el.textContent = '';
}

/* ============================================================
   钱包：生成 + 选择
   ============================================================ */
async function generateWallet() {
    try {
        const data = await api('/api/wallet/new', 'POST');
        if (!data.wallet) throw new Error('生成失败');
        const w = {
            label: '钱包 #' + (state.wallets.length + 1),
            privateKey: data.wallet.privateKey,
            publicKey: data.wallet.publicKey,
            address: data.wallet.address
        };
        state.wallets.push(w);
        state.selectedWallet = state.wallets.length - 1; // 自动选中新钱包
        renderWallets();
        renderTransfer();
        showMessage('txMessage', '✅ 新钱包已生成：' + shortAddr(w.address, 16), 'success');
        saveWallets();
        await refreshAll();
    } catch (err) {
        showMessage('txMessage', '❌ 生成钱包失败：' + err.message, 'error');
    }
}

function selectWallet(index) {
    state.selectedWallet = index;
    renderWallets();
    renderTransfer();
    refreshSelectedWalletDetails();
    saveWallets();
}

function setAsReceiver(index) {
    const w = state.wallets[index];
    if (!w) return;
    document.getElementById('toAddress').value = w.address;
    showMessage('txMessage', '📋 已将 ' + w.label + ' 设为接收方', 'info', 2000);
}

function removeWallet(index) {
    if (!confirm('确定删除 ' + state.wallets[index].label + '？私钥将无法恢复！')) return;
    state.wallets.splice(index, 1);
    if (state.selectedWallet >= state.wallets.length) state.selectedWallet = state.wallets.length - 1;
    renderWallets();
    renderTransfer();
    saveWallets();
}

function copySelectedAddress() {
    const w = state.wallets[state.selectedWallet];
    if (!w) return;
    navigator.clipboard.writeText(w.address).then(() => {
        showMessage('txMessage', '📋 地址已复制到剪贴板', 'success', 2000);
    });
}

/* 本地持久化 */
function saveWallets() {
    try {
        localStorage.setItem('starcoin_wallets', JSON.stringify(state.wallets));
        localStorage.setItem('starcoin_selected', String(state.selectedWallet));
    } catch (e) {}
}
function loadWallets() {
    try {
        const saved = localStorage.getItem('starcoin_wallets');
        if (saved) state.wallets = JSON.parse(saved);
        const sel = localStorage.getItem('starcoin_selected');
        if (sel !== null) state.selectedWallet = Math.min(parseInt(sel), state.wallets.length - 1);
    } catch (e) {}
}

/* ============================================================
   渲染：钱包列表
   ============================================================ */
async function renderWallets() {
    const list = document.getElementById('walletList');

    if (state.wallets.length === 0) {
        list.innerHTML = '<div style="color:#888; font-size:13px; padding:20px 0; text-align:center;">还没有钱包<br>点击上方 "＋ 生成新钱包" 开始</div>';
        document.getElementById('selectedWalletInfo').style.display = 'none';
    } else {
        list.innerHTML = state.wallets.map((w, i) => `
            <div class="wallet-item ${i === state.selectedWallet ? 'selected' : ''}" onclick="selectWallet(${i})">
                <div class="wallet-label">${w.label}</div>
                <div class="wallet-address">${escapeHtml(shortAddr(w.address, 40))}</div>
                <div class="wallet-balance" id="wallet-balance-${i}">余额: --</div>
                <div class="wallet-actions">
                    <button class="secondary small" onclick="event.stopPropagation(); copyWalletAddress(${i})">复制地址</button>
                    <button class="secondary small" onclick="event.stopPropagation(); setAsReceiver(${i})">设为接收方</button>
                    <button class="danger small" onclick="event.stopPropagation(); removeWallet(${i})">删除</button>
                </div>
            </div>
        `).join('');

        // 异步查询每个钱包余额
        for (let i = 0; i < state.wallets.length; i++) {
            try {
                const data = await api('/api/balance/' + state.wallets[i].address);
                const el = document.getElementById('wallet-balance-' + i);
                if (el) el.textContent = '余额: ' + (data.balance || 0) + ' STC';
            } catch (e) {}
        }

        if (state.selectedWallet >= 0) {
            document.getElementById('selectedWalletInfo').style.display = 'block';
        }
    }
    renderTransfer();
}

function copyWalletAddress(i) {
    const w = state.wallets[i];
    if (!w) return;
    navigator.clipboard.writeText(w.address).then(() => {
        showMessage('txMessage', '📋 地址已复制', 'success', 1500);
    });
}

async function refreshSelectedWalletDetails() {
    const w = state.wallets[state.selectedWallet];
    if (!w) { document.getElementById('selectedWalletInfo').style.display = 'none'; return; }
    document.getElementById('selectedWalletInfo').style.display = 'block';
    document.getElementById('selectedWalletAddress').textContent = w.address;

    try {
        const data = await api('/api/balance/' + w.address);
        document.getElementById('selectedWalletBalance').textContent = (data.balance || 0) + ' STC';
    } catch (e) {
        document.getElementById('selectedWalletBalance').textContent = '查询失败';
    }

    // 交易历史
    try {
        const history = await api('/api/transactions/' + w.address);
        const hist = document.getElementById('selectedWalletHistory');
        if (!history.transactions || history.transactions.length === 0) {
            hist.innerHTML = '<div style="color:#666; font-size:11px; padding:10px; text-align:center;">暂无交易记录</div>';
        } else {
            hist.innerHTML = history.transactions.slice(0, 10).map(tx => `
                <div style="background:rgba(255,255,255,0.04); padding:6px 8px; border-radius:4px; margin:4px 0; font-size:11px;">
                    <div style="color:${tx.from === w.address ? '#f87171' : '#4ade80'}; font-weight:bold;">
                        ${tx.from === w.address ? '→ 转出' : '← 收到'}: ${tx.amount} STC
                    </div>
                    <div style="color:#666; font-size:10px; margin-top:2px;">
                        Block #${tx.blockIndex} | ${new Date(tx.timestamp).toLocaleString()}
                    </div>
                </div>
            `).join('');
        }
    } catch (e) {
        document.getElementById('selectedWalletHistory').textContent = '查询失败';
    }
}

/* ============================================================
   渲染：转账表单
   ============================================================ */
function renderTransfer() {
    // 更新发送方下拉
    const fromSel = document.getElementById('fromWallet');
    const currentVal = fromSel.value;
    fromSel.innerHTML = '<option value="">-- 请选择钱包 --</option>' +
        state.wallets.map((w, i) => `<option value="${i}">${w.label} (${shortAddr(w.address, 16)})</option>`).join('');
    // 保持选中
    if (currentVal !== '' && state.wallets[parseInt(currentVal)]) fromSel.value = currentVal;
    else if (state.selectedWallet >= 0) fromSel.value = String(state.selectedWallet);

    // 矿工地址自动填充
    const minerInput = document.getElementById('minerAddress');
    if (state.selectedWallet >= 0 && !minerInput.dataset.manual) {
        minerInput.value = state.wallets[state.selectedWallet].address;
    }

    // 更新签名提示
    const fromIdx = parseInt(document.getElementById('fromWallet').value);
    if (fromIdx >= 0 && state.wallets[fromIdx]) {
        document.getElementById('signInfo').style.display = 'block';
    } else {
        document.getElementById('signInfo').style.display = 'none';
    }

    // 显示发送方余额
    updateFromBalanceHint();
}

document.getElementById('fromWallet').addEventListener('change', renderTransfer);
document.getElementById('minerAddress').addEventListener('input', () => {
    document.getElementById('minerAddress').dataset.manual = '1';
});

async function updateFromBalanceHint() {
    const fromIdx = parseInt(document.getElementById('fromWallet').value);
    if (fromIdx >= 0 && state.wallets[fromIdx]) {
        try {
            const data = await api('/api/balance/' + state.wallets[fromIdx].address);
            document.getElementById('fromBalanceHint').textContent = '可用余额: ' + (data.balance || 0) + ' STC（未包含交易池中待确认的 ' + (data.pendingTransactions || 0) + ' 笔）';
        } catch (e) {
            document.getElementById('fromBalanceHint').textContent = '';
        }
    } else {
        document.getElementById('fromBalanceHint').textContent = '';
    }
}

/* ============================================================
   操作：发起交易 + 挖矿
   ============================================================ */
async function submitTransaction() {
    const fromIdx = parseInt(document.getElementById('fromWallet').value);
    const to = document.getElementById('toAddress').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);
    const fee = parseFloat(document.getElementById('fee').value) || 0;
    const note = document.getElementById('note').value.trim();

    if (fromIdx < 0 || !state.wallets[fromIdx]) { showMessage('txMessage', '❌ 请选择发送方钱包', 'error'); return; }
    if (!to) { showMessage('txMessage', '❌ 请填写接收方地址', 'error'); return; }
    if (!amount || amount <= 0) { showMessage('txMessage', '❌ 金额必须大于 0', 'error'); return; }

    const fromWallet = state.wallets[fromIdx];
    clearMessage('txMessage');
    showMessage('txMessage', '🔑 使用 ' + fromWallet.label + ' 的私钥进行 ECDSA 签名...', 'info', 0);

    try {
        const result = await api('/api/transaction', 'POST', {
            from: fromWallet.address,
            to: to,
            amount: amount,
            fee: fee,
            note: note,
            privateKey: fromWallet.privateKey,  // 关键：私钥只在服务器本地做签名
            publicKey: fromWallet.publicKey
        });

        if (result.success) {
            showMessage('txMessage', '✅ 交易已提交到交易池！（txid: ' + (result.transaction && result.transaction.id ? shortAddr(result.transaction.id, 16) : '') + '）下一步点击"挖矿"来打包这笔交易', 'success', 6000);
            document.getElementById('amount').value = 10;
            document.getElementById('note').value = '';
            await refreshAll();
        } else {
            showMessage('txMessage', '❌ ' + (result.error || '提交失败'), 'error');
        }
    } catch (err) {
        showMessage('txMessage', '❌ 网络错误：' + err.message, 'error');
    }
}

async function mineBlock() {
    const btn = document.getElementById('mineBtn');
    const minerAddr = document.getElementById('minerAddress').value.trim();

    if (!minerAddr) { showMessage('txMessage', '❌ 请先选择或填写矿工奖励地址', 'error'); return; }

    btn.disabled = true;
    btn.classList.add('mining-active');
    btn.textContent = '⛏️ 正在挖矿...（寻找 nonce）';
    clearMessage('txMessage');
    showMessage('txMessage', '⛏️ 正在进行工作量证明，请稍候...', 'info', 0);

    try {
        const result = await api('/api/mine', 'POST', { minerAddress: minerAddr });
        if (result.success) {
            showMessage('txMessage', '🎉 挖矿成功！区块 #' + (result.block ? result.block.index : '?') + ' 已生成，奖励 50 STC', 'success', 5000);
        } else {
            showMessage('txMessage', '❌ ' + (result.error || '挖矿失败'), 'error');
        }
    } catch (err) {
        showMessage('txMessage', '❌ 挖矿错误：' + err.message, 'error');
    } finally {
        btn.disabled = false;
        btn.classList.remove('mining-active');
        btn.textContent = '⛏️ 开始挖矿并打包交易';
        await refreshAll();
    }
}

/* ============================================================
   渲染：交易池 + 地址榜 + 区块链
   ============================================================ */
async function refreshMempool() {
    try {
        const data = await api('/api/mempool');
        const el = document.getElementById('mempool');
        document.getElementById('statMempool').textContent = data.count || 0;

        if (!data.count || data.count === 0) {
            el.innerHTML = '<div class="mempool-empty">交易池为空，提交一笔转账后会出现在这里</div>';
        } else {
            el.innerHTML = data.transactions.map(tx => `
                <div class="mempool-item">
                    <div style="font-weight:bold; color:#60a5fa;">
                        ${shortAddr(tx.from, 10)} → ${shortAddr(tx.to, 10)}: <b>${tx.amount} STC</b>
                        ${tx.fee ? '(+ 费 ' + tx.fee + ')' : ''}
                    </div>
                    ${tx.note ? '<div style="color:#888; font-size:11px; margin-top:3px;">备注: ' + escapeHtml(tx.note) + '</div>' : ''}
                    <div style="color:#666; font-size:10px; margin-top:3px; font-family:monospace;">txid: ${shortAddr(tx.id, 20)}</div>
                    ${tx.signature ? '<div style="color:#4ade80; font-size:10px; margin-top:2px;">✅ 已 ECDSA 签名</div>' : ''}
                </div>
            `).join('');
        }
    } catch (e) {
        document.getElementById('mempool').textContent = '查询失败';
    }
}

async function refreshAddressRank() {
    try {
        const data = await api('/api/addresses');
        const el = document.getElementById('addressRank');
        const list = (data.addresses || []).slice(0, 8);
        if (list.length === 0) {
            el.innerHTML = '<div class="mempool-empty">暂无数据</div>';
        } else {
            el.innerHTML = list.map(a => `
                <div class="address-row">
                    <span class="addr">${shortAddr(a.address, 18)} <span style="color:#666;">(${a.txCount}笔)</span></span>
                    <span class="bal">${a.balance} STC</span>
                </div>
            `).join('');
        }
    } catch (e) {
        document.getElementById('addressRank').textContent = '查询失败';
    }
}

async function refreshChain() {
    try {
        const data = await api('/api/blockchain');
        document.getElementById('statBlocks').textContent = data.stats && data.stats.totalBlocks || 0;
        const validStat = document.getElementById('statValid');
        validStat.textContent = data.isValid ? '✓ 有效' : '✗ 无效';
        validStat.className = 'stat-value ' + (data.isValid ? 'valid' : 'invalid');
        document.getElementById('statPort').textContent = data.port || '--';

        const el = document.getElementById('chainVisual');
        const chain = data.chain || [];
        if (chain.length === 0) {
            el.innerHTML = '<div class="mempool-empty">暂无区块</div>';
            return;
        }
        el.innerHTML = chain.slice().reverse().map(b => {
            const isGenesis = b.index === 0;
            const txList = (b.transactions || []).map(tx => {
                let cls = 'block-tx ';
                let prefix = '';
                if (tx.from === 'SYSTEM' || !tx.from) { cls += 'reward'; prefix = '🎁 '; }
                else if (tx.signature) { cls += 'signed'; prefix = '✍️ '; }
                else { cls += 'unsigned'; prefix = '⚠ '; }

                if (tx.from === 'SYSTEM') {
                    return `<div class="${cls}">${prefix}奖励 → ${shortAddr(tx.to, 10)}: ${tx.amount} STC</div>`;
                }
                if (!tx.from) {
                    return `<div class="${cls}">${prefix}备注: ${escapeHtml(tx.note || tx.to || '')}</div>`;
                }
                return `<div class="${cls}">${prefix}${shortAddr(tx.from, 8)} → ${shortAddr(tx.to, 8)}: ${tx.amount} STC${tx.fee ? '(费'+tx.fee+')':''}</div>`;
            }).join('');

            return `
                <div class="block-card ${isGenesis ? 'genesis' : ''}" title="区块 #${b.index}">
                    <div class="block-height">${isGenesis ? '🌱 创世区块' : '📦 区块 #' + b.index}</div>
                    <div class="block-hash">本块: ${shortAddr(b.hash, 24)}</div>
                    <div class="block-hash">前驱: ${shortAddr(b.previousHash, 24)}</div>
                    <div style="color:#888; font-size:10px; margin-top:4px;">Nonce: ${b.nonce} · ${new Date(b.timestamp).toLocaleString()}</div>
                    <div style="margin-top:6px; border-top:1px dashed rgba(255,255,255,0.1); padding-top:6px;">
                        <div style="color:#ffd700; font-size:11px; margin-bottom:4px;">包含交易:</div>
                        ${txList || '<div style="color:#666;font-size:10px;">无交易</div>'}
                    </div>
                </div>
            `;
        }).join('');
    } catch (e) {
        document.getElementById('chainVisual').textContent = '查询失败';
    }
}

/* ============================================================
   整体刷新
   ============================================================ */
async function refreshAll() {
    updateFromBalanceHint();
    refreshSelectedWalletDetails();
    renderWallets(); // 重绘以刷新余额
    refreshMempool();
    refreshAddressRank();
    refreshChain();
}

/* ============================================================
   初始化
   ============================================================ */
loadWallets();
renderWallets();
renderTransfer();
refreshAll();

// 每 15 秒自动刷新一次（轻量刷新：不重绘钱包列表，只刷新动态数据）
setInterval(() => {
    refreshMempool();
    refreshChain();
    refreshAddressRank();
}, 15000);
</script>
